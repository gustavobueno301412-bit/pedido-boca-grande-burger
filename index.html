<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛵 Boca Grande Burger 👄🍔</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 10px; max-width: 600px; margin: auto; }
       
        /* Banner Ajustado */
        #banner { width: 100%; height: 200px; background-size: cover; background-position: center center; background-repeat: no-repeat; border-radius: 10px; transition: 0.5s; }
       
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 10px; }
       
        .card { border: 1px solid #ff8c00; padding: 10px; border-radius: 8px; text-align: center; display: flex; flex-direction: column; }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 5px; margin-bottom: 5px; }
       
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .btn { background: #ff8c00; border: none; padding: 12px; width: 100%; color: #fff; font-weight: bold; border-radius: 5px; cursor: pointer; margin-top: 10px; }
        input[type="text"], input[type="number"], select { width: 100%; padding: 10px; margin: 5px 0; border-radius: 5px; border: none; box-sizing: border-box; }
    </style>
</head>
<body>

<div id="banner"></div>
<div id="status-loja" style="text-align:center; padding:10px; color:#2e7d32; font-weight:bold;"></div>

<div class="filtros" style="display:flex; gap:5px;">
    <button class="btn" onclick="filtrar('Todos')">Todos 📝</button>
    <button class="btn" onclick="filtrar('Lanche')">Lanches 🍔</button>
    <button class="btn" onclick="filtrar('Bebida')">Bebidas 🥃</button>
</div>

<input type="text" id="busca" placeholder="🔍 Buscar produto..." onkeyup="filtrar()">
<div id="lista-produtos" class="grid"></div>

<div id="modal" class="modal">
    <h2 id="modal-nome"></h2>
    <p id="modal-desc"></p>
    <h3>➕ Adicionais 😋👍</h3>
    <div id="lista-adicionais"></div>
    <h3>➖ Retirar 👎😕</h3>
    <div id="lista-retiradas"></div>
    <button class="btn" onclick="adicionarAoCarrinho()">Adicionar ao Carrinho ✔️</button>
    <button class="btn" style="background:#555" onclick="document.getElementById('modal').style.display='none'">Fechar ❌</button>
</div>

<div class="carrinho" style="margin-top:20px; border-top:1px solid #ff8c00; padding-top:10px;">
    <h2>🛒 Carrinho (⚠️ Retirar click na lixeirinha 🗑️)</h2>
    <input type="text" id="nome-cliente" placeholder="👤 Seu nome completo">
    <div id="itens-carrinho"></div>
    <p>📋 Subtotal: R$ <span id="subtotal">0.00</span></p>
   
    <select id="entrega" onchange="calcularTotal(); toggleEndereco()">
        <option value="0">🏠🏃‍♂️ Retirada (R$ 0.00)</option>
        <option value="4">🛵📦 Cruzeiro (R$ 4.00)</option>
        <option value="5">🛵📦 Lavrinhas (R$ 5.00)</option>
        <option value="5">🛵📦 Embaú/Embauzinho (R$ 5.00)</option>
    </select>
   
    <input type="text" id="endereco" placeholder="📍 Digite o endereço de entrega" style="display:none;">
   
    <select id="pagamento" onchange="toggleTroco()">
        <option value="Pix">🔑 Pix (Enviaremos a chave pix)</option>
        <option value="Cartão">💳 Cartão (Enviaremos a maquininha)</option>
        <option value="Dinheiro">💰 Dinheiro</option>
    </select>
   
    <input type="number" id="troco" placeholder="💵 Troco para quanto?" style="display:none;">
   
    <p><strong>🖨️ Total Final: R$ <span id="total-final">0.00</span></strong></p>
    <button class="btn" onclick="finalizar()">✅ Enviar Pedido WhatsApp 🚀</button>
</div>

<script>
    let produtos = [], adicionais = [], banners = [], carrinho = [];
    const urls = {
        produtos: "https://docs.google.com/spreadsheets/d/e/2PACX-1vS8LycHY-p1Mu0gzme6BdVMG6Mb8QmXmy73ceE-IEZOOk3W9uE_kgoVIsS1Qlhwto2l8Yv7LiJiE9lo/pub?gid=0&single=true&output=csv",
        adicionais: "https://docs.google.com/spreadsheets/d/e/2PACX-1vS8LycHY-p1Mu0gzme6BdVMG6Mb8QmXmy73ceE-IEZOOk3W9uE_kgoVIsS1Qlhwto2l8Yv7LiJiE9lo/pub?gid=1251693276&single=true&output=csv",
        banner: "https://docs.google.com/spreadsheets/d/e/2PACX-1vS8LycHY-p1Mu0gzme6BdVMG6Mb8QmXmy73ceE-IEZOOk3W9uE_kgoVIsS1Qlhwto2l8Yv7LiJiE9lo/pub?gid=441397125&single=true&output=csv",
        horario: "https://docs.google.com/spreadsheets/d/e/2PACX-1vS8LycHY-p1Mu0gzme6BdVMG6Mb8QmXmy73ceE-IEZOOk3W9uE_kgoVIsS1Qlhwto2l8Yv7LiJiE9lo/pub?gid=214515598&single=true&output=csv"
    };

    Papa.parse(urls.produtos, { download: true, header: true, complete: (res) => { produtos = res.data.filter(p=>p['Nome do Produto']); filtrar('Todos'); }});
    Papa.parse(urls.adicionais, { download: true, header: true, complete: (res) => { adicionais = res.data; }});
    Papa.parse(urls.banner, { download: true, header: true, complete: (res) => { banners = res.data; setInterval(() => { let b = banners[Math.floor(Math.random()*banners.length)]; document.getElementById('banner').style.backgroundImage = `url('${b['Imagem (URL)']}')`; }, 3000); }});
    Papa.parse(urls.horario, { download: true, header: true, complete: (res) => { document.getElementById('status-loja').innerText = res.data[0].status; }});

    function filtrar(cat) {
        let b = document.getElementById('busca').value.toLowerCase();
        let lista = produtos.filter(p => (cat === 'Todos' || cat === undefined || p.Categoria === cat) && p['Nome do Produto'].toLowerCase().includes(b));
        document.getElementById('lista-produtos').innerHTML = lista.map(p => `
            <div class="card">
                <img src="${p['Imagem (URL)']}" alt="${p['Nome do Produto']}">
                <h3>${p['Nome do Produto']}</h3>
                <p style="font-size:0.8em;">${p['Descricao'] || ''}</p>
                <p>R$ ${p['Preco']}</p>
                <button class="btn" onclick="abrirModal('${p['Nome do Produto']}', ${p['Preco']}, '${p.Categoria}', '${p['Descricao']}')">Detalhes 📝</button>
            </div>
        `).join('');
    }

    function toggleEndereco() { document.getElementById('endereco').style.display = (document.getElementById('entrega').value !== '0') ? 'block' : 'none'; }
    function toggleTroco() { document.getElementById('troco').style.display = (document.getElementById('pagamento').value === 'Dinheiro') ? 'block' : 'none'; }

    function abrirModal(nome, preco, cat, desc) {
        document.getElementById('modal-nome').innerText = nome;
        document.getElementById('modal-desc').innerText = desc;
        window.temp = { nome, preco, cat, extras: [], rems: [] };
        document.getElementById('lista-adicionais').innerHTML = adicionais.filter(a => a.setor === cat && a.categoria === 'Adicional').map(a => `<p><input type="checkbox" class="add" value="${a.preco}" data-n="${a.nome_item}"> ${a.nome_item} (+R$ ${a.preco})</p>`).join('');
        document.getElementById('lista-retiradas').innerHTML = adicionais.filter(a => a.setor === cat && a.categoria === 'Retirada').map(a => `<p><input type="checkbox" class="rem" data-n="${a.nome_item}"> ${a.nome_item}</p>`).join('');
        document.getElementById('modal').style.display = 'block';
    }

    function adicionarAoCarrinho() {
        window.temp.extras = Array.from(document.querySelectorAll('.add:checked')).map(i => ({ nome: i.dataset.n, preco: parseFloat(i.value) }));
        window.temp.rems = Array.from(document.querySelectorAll('.rem:checked')).map(i => i.dataset.n);
        carrinho.push(window.temp);
        document.getElementById('modal').style.display = 'none';
        alert("Adicionado no carrinho!");
        calcularTotal();
    }

    function calcularTotal() {
        let sub = carrinho.reduce((a, b) => a + b.preco + b.extras.reduce((x, y) => x + y.preco, 0), 0);
        let taxa = parseFloat(document.getElementById('entrega').value);
        document.getElementById('subtotal').innerText = sub.toFixed(2);
        document.getElementById('total-final').innerText = (sub + taxa).toFixed(2);
        document.getElementById('itens-carrinho').innerHTML = carrinho.map((p, i) => `<p>• ${p.nome} ${p.extras.map(e => '(+'+e.nome+')')} ${p.rems.map(r => '(Sem '+r+')')} <span onclick="carrinho.splice(${i},1); calcularTotal();" style="cursor:pointer; color:red;">🗑️</span></p>`).join('');
    }

    function finalizar() {
        let nomeCliente = document.getElementById('nome-cliente').value;
        let msg = `🍔 *PEDIDO BOCA GRANDE*%0A%0A`;
        msg += `👤 *Cliente:* ${nomeCliente}%0A`;
        msg += `📋 *Itens:*%0A` + carrinho.map(p => `• ${p.nome} ${p.extras.map(e => '(+'+e.nome+')')} ${p.rems.map(r => '(Sem '+r+')')}`).join('%0A');
        if(document.getElementById('entrega').value !== '0') msg += `%0A%0A🏠 *Endereço:* ${document.getElementById('endereco').value}`;
        msg += `%0A%0A💰 *Subtotal:* R$ ${document.getElementById('subtotal').innerText}`;
        msg += `%0A🚚 *Taxa:* R$ ${document.getElementById('entrega').value}`;
        msg += `%0A🎯 *Total Final:* R$ ${document.getElementById('total-final').innerText}`;
        msg += `%0A💳 *Pagamento:* ${document.getElementById('pagamento').value}`;
        if(document.getElementById('pagamento').value === 'Dinheiro') msg += `%0A💵 *Troco para:* R$ ${document.getElementById('troco').value}`;
        msg += `%0A%0A🙏 *Agradecemos a preferência!*`;
        window.open(`https://wa.me/5512997058280?text=${msg}`);
    }
</script>
</body>
</html>
